<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title> - Personal Profile</title>
    <meta name="keywords" content="">
    <meta name="description" content="">

    <link rel="shortcut icon" href="favicon.ico">

    <link href="/static/hAdmin/css/bootstrap.min.css?v=3.3.6" rel="stylesheet">
    <link href="/static/hAdmin/css/font-awesome.css?v=4.4.0" rel="stylesheet">
    <!-- Sweet Alert -->
    <link href="/static/hAdmin/css/plugins/sweetalert/sweetalert.css" rel="stylesheet">
    <link href="/static/hAdmin/css/animate.css" rel="stylesheet">
    <link href="/static/hAdmin/css/style.css?v=4.1.0" rel="stylesheet">
    <link href="/static/hAdmin/css/plugins/toastr/toastr.min.css" rel="stylesheet">

    <style>
        .addList {
            padding: 10px 30px 10px 30px;
            height: 90px;
            margin-top: 3px;
        }

    </style>
</head>

<body class="gray-bg">
    <div class="wrapper wrapper-content" id="app">
        <span id="gloUrl" style="display: none"></span>
        <div class="row animated fadeInRight">
            <div class="col-xs-4">
                <div class="col-sm-12">
                    <div class="ibox float-e-margins">
                        <div class="ibox-title">
                            <h5>Account Information</h5>
                        </div>
                        <div>

                            <div class="ibox-content profile-content">
                                <h4>Nickname : <strong id="name"></strong></h4>
                                <p><i class="fa fa-map-marker"></i> <span id="curraddress">China</span> </p>


                                <div class="row m-t-lg">
                                    <div class="col-sm-10">

                                        <h5><strong>Registration Date：</strong> <span id="createtime">&nbsp;33</span> </h5>
                                    </div>
                                    <br>
                                    <div class="col-sm-10">
                                        <button class="btn btn-danger" id="logout">Logout</button>
                                        <button class="btn btn-primary " data-toggle="modal" data-target="#myModalDe" id="edit">Edit Information</button>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div class="col-xs-8">
                <div class="col-sm-12 ">
                    <div class="ibox float-e-margins">
                        <div class="ibox-title">
                            <h5>Account Binding Information</h5>
                        </div>

                        <div class="ibox-content profile-content" style="text-align: center">
                            <div class="row m-t-lg">
                                <div class="col-sm-10" >
                                    <div class="col-xs-4 col-lg-push-5" >
                                        <img style="width: 120px;height: 120px;" class="img-responsive img-circle" src="" alt="No Image" id="currimg">
                                    </div>
                                </div>
                            </div>
                            <div class="row m-t-lg">
                                <div class="col-sm-10">
                                    <h5><strong>Full Name：</strong>
                                        <span id="curruserName"></span>
                                    </h5>
                                </div>
                            </div>
                            <div class="row m-t-lg">
                                <div class="col-sm-10">
                                    <h5><strong>ID Card No.：</strong>
                                        <span id="curridCard"></span>
                                    </h5>
                                </div>
                            </div>

                            <div class="row m-t-lg">
                                <div class="col-sm-10">
                                    <h5><strong>Gender：</strong>
                                        <span id="currgender"></span>
                                    </h5>
                                </div>
                            </div>
                            <div class="row m-t-lg">
                                <div class="col-sm-10">
                                    <h5><strong>Contact Number：</strong>
                                        <span id="currphoneNumber"></span>
                                    </h5>
                                </div>
                            </div>
                            <div class="row m-t-lg">
                                <div class="col-sm-10">
                                    <h5><strong>Age：</strong>
                                        <span id="currage"></span>
                                    </h5>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>

            </div>

<div class="col-xs-12">
    <!--            List          -->
    <div class="project-list">
        <table class="table table-hover">
            <tbody id="listBody"></tbody>
        </table>
    </div>
</div>


        </div>
    </div>
    <div class="modal inmodal" id="myModalDe" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content animated bounceInRight" style="min-height: 400px;overflow-y: scroll">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal">
                        <span aria-hidden="true">&times;</span>
                        <span class="sr-only">Close</span>
                    </button>
                    <i class="fa fa-pencil modal-icon" style="font-size: 60px"></i>
                    <h4 class="modal-title">Edit Information</h4>

                </div>
                <div class="formListAdd">


                    <div class="modal-body addList">

                        <div class="form-group col-xs-12">
                            <label>Photo</label>
                            <input type="file" id="editFile" required="required" multiple="multiple" name="file"
                                   class="form-control"></div>
                    </div>
                    <div class="modal-body addList">

                        <div class="form-group">
                            <div class="col-xs-12">
                                <label>Name</label>
                            </div>

                            <div class="col-xs-12">
                                <input type="text" placeholder="Enter Name" id="formusername" name="eqName" class="form-control">
                            </div>

                        </div>


                    </div>

                    <div class="modal-body addList">
                        <div class="form-group">
                            <div class="col-xs-12">
                                <label>ID Card No.</label>
                            </div>

                            <div class="col-xs-12">
                                <input type="text" placeholder="Enter 18-digit ID Card No."  id="formidcard"  class="form-control">
                            </div>

                        </div>
                    </div>
                    <div class="modal-body addList">
                        <div class="form-group">
                            <div class="col-xs-12">
                                <label>Age</label>
                            </div>

                            <div class="col-xs-12">
                                <input type="text" placeholder="Enter Age"  id="formage"  class="form-control">
                            </div>

                        </div>
                    </div>
                    <div class="modal-body addList">
                        <div class="form-group">
                            <div class="col-xs-12">
                                <label>Phone Number</label>
                            </div>

                            <div class="col-xs-12">
                                <input type="text" placeholder="Enter 11-digit Phone Number" maxlength="11" id="formphonenumber"  class="form-control">
                            </div>

                        </div>
                    </div>
                    <div class="modal-body addList">
                        <div class="form-group">
                            <div class="col-xs-12">
                                <label>Address</label>
                            </div>

                            <div class="col-xs-12">
                                <input type="text" placeholder="Enter Address"  id="formaddress"  class="form-control">
                            </div>

                        </div>
                    </div>
                    <div class="modal-body addList">

                        <div class="form-group col-xs-12">
                            <label>Gender</label>
                            <select id="formsex" class="form-control">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                    </div>


                    <div class="modal-footer">
                        <button type="button" class="btn btn-white" id="close" data-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-success" data-dismiss="modal" id="confirmEditDriver">Confirm
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal inmodal" id="myModalMessage"  tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog" >
            <div class="modal-content animated bounceInRight" style="min-height: 400px;overflow-y: scroll">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal">
                        <span aria-hidden="true">&times;</span>
                        <span class="sr-only">Close</span>
                    </button>
                    <i class="fa fa-pencil modal-icon" style="font-size: 60px"></i>
                    <h4 class="modal-title">Send Message</h4>

                </div>
                <div class="formListAdd">

                    <div class="modal-body addList" style="height: 200px;">
                        <div class="form-group">
                            <div class="col-xs-12">
                                <label>Content</label>
                            </div>

                            <div class="col-xs-12">
                                <textarea type="text" placeholder="Enter Content" rows="5" id="message"  class="form-control"></textarea>
                            </div>

                        </div>
                    </div>

                    <div class="modal-footer">

                        <button type="button" class="btn btn-success" data-dismiss="modal" id="confirmSend">Send
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Global JS -->
    <script src="/static/hAdmin/js/jquery.min.js?v=2.1.4"></script>
    <script src="/static/hAdmin/js/bootstrap.min.js?v=3.3.6"></script>

    <!-- Custom JS -->
    <script src="/static/hAdmin/js/content.js?v=1.0.0"></script>

    <script src="/static/hAdmin/js/plugins/sweetalert/sweetalert.min.js"></script>
    <!-- Peity -->
    <script src="/static/hAdmin/js/plugins/peity/jquery.peity.min.js"></script>
    <script src="/static/hAdmin/js/plugins/toastr/toastr.min.js"></script>
    <!-- Peity -->
    <script src="/static/hAdmin/js/demo/peity-demo.js"></script>
    <script src="/static/js/GloJs.js"></script>


<script>
    $(function (){
        let Glo_BaseUrl = $("#gloUrl").attr("gloUValue")
        let Glo_user = localStorage.getItem("userId")
        let id = ""
        let role = getRoleSetMenu()

        // Get Personal Information
        function selectInfo(){

            $.ajax({
                url: Glo_BaseUrl + "/sysuser/detail",
                type: "get",
                data: {
                    "id":Glo_user,
                    "role":role
                },
                success: function (data) {


                    $("#curruserName").text(data.Data.username)
                    $("#formusername").val(data.Data.username)
                    $("#name").text(data.Data.username)

                    $("#currphoneNumber").text(data.Data.phonenumber)
                    $("#formphonenumber").val(data.Data.phonenumber)
                    $("#createtime").text(data.Data.createtime)
                    $("#curridCard").text(data.Data.idcard)
                    $("#formidcard").val(data.Data.idcard)
                    $("#formage").val(data.Data.age)
                    $("#currage").text(data.Data.age)
                    $("#curraddress").text(data.Data.address)
                    $("#formaddress").val(data.Data.address)

                    $("#currimg").attr("src",data.Data.img)

                    $("#currgender").text(data.Data.sex)
                    $("#formsex").val(data.Data.sex)

                    if (data.Data.role === "1"){
                        $("#role").text("Administrator")
                    }else if (data.Data.role === "2"){
                        $("#role").text("User")
                    }else {
                        $("#role").text("Other Role")
                    }

                },
                error: function () {
                    alert("Server Error! Network Error!")
                }
            })
        }
        selectInfo()
        // Confirm Edit
        $("#confirmEditDriver").click(function () {


            var f = $("input[name='editFile']").val();//File content (File)
            var formData = new FormData();//Instantiate FormData for file upload
            if ($("#editFile")[0].files[0] != undefined){
                formData.append("file",$("#editFile")[0].files[0]);
            }

            formData.append("username",$("#formusername").val());
            formData.append("sex",$("#formsex").val());
            formData.append("idcard",$("#formidcard").val());
            formData.append("phonenumber",$("#formphonenumber").val());
            formData.append("address",$("#formaddress").val());
            formData.append("age",$("#formage").val());
            formData.append("id",localStorage.getItem("userId"));


            // console.log(f)
            $.ajax({
                url: Glo_BaseUrl + "/sysuser/editUserPerson",
                type: "post",
                data:formData
                ,
                processData : false,
                contentType : false,
                success: function (data) {

                    if (data.code === 200) {
                        toastr.success("Success", 'Notification!')
                        $("#close").click()
                    } else {
                        toastr.error(data.msg, 'Notification!')
                    }
                    selectInfo();

                },
                error: function () {
                    alert("Server Error! Network Error!")
                }
            })
        });
        // Get Message List
        function getMessageList(){
            let total = 0;//Total count
            let pageSize = 6;//Items per page
            let html_dom = $("#listBody")
            $.ajax({
                url: Glo_BaseUrl + "/message/list",
                type: "get",
                data:{
                    "pageSize": 99,
                    "pageNum": 1,
                    "receiveId":Glo_user,
                },
                success: function (data) {
                    let ListStr = ''
                    let specialBtn = ``

                    for (let i = 0; i < data.list.length; i++) {
                        let typeStr = `   <td class="project-completion">
                                                <small>Sender：<span id="dataForClass">${data.list[i].senderName}</span> </small>

                </td>`
                        let item = data.list[i]

                        let statusStr = `<td class="project-status">
                                        <span class="label label-default" >Replied</span>
                                        </td>`
                        specialBtn = `

                                <button class="btn btn-sm btn-danger stopBtn" thisId="${item.id}" title="Delete"> <i class="fa fa-close"></i> </button>
                                `
                        if (item.status === '0'){
                            statusStr = `<td class="project-status">
                                        <span class="label label-danger" >Unreplied</span>
                                        </td>`
                            specialBtn = `
<button class="btn btn-warning btn-sm seeRentDetail" title="View" id="seeRentDetail" data-toggle="modal" data-target="#myModalMessage"
                 thisId="${data.list[i].id}" senderId="${data.list[i].senderId}"><i class="fa fa-edit"></i>  </button>
                                <button class="btn btn-sm btn-danger stopBtn" thisId="${item.id}" title="Delete"> <i class="fa fa-close"></i> </button>
                                `
                        }


                        ListStr +=
                            `<tr>`+statusStr+`
                                        <td class="project-title">
                                            <span > <strong> ${data.list[i].content}</strong> </span>
                                            <br/>
                                              <small>Receiver：<span id="EventTime">${data.list[i].receiveName}</span> </small>
                                        </td>


             `+typeStr+`
    <td class="project-completion">
                                                <small>Send Time：<span id="dataForClass">${data.list[i].createTime}</span> </small>

                </td>
                <td class="project-actions">

` + specialBtn + `

                                 </td>
                </tr>
                `

                    }

                    if (data.code !== 500) {
                        html_dom.html("")
                        html_dom.append(ListStr)
                    } else {
                        alert("Failed to Get Data")
                    }
                    total = data.total
                    $("#data_total").html(data.total);
                    // Delete Message
                    $(".stopBtn").unbind("click").click(function () {
                        let id = $(this).attr("thisId")
                        swal({
                            title: "Are you sure to delete this message?",
                            text: "Deletion is irreversible!",
                            type: "warning",
                            showCancelButton: true,
                            confirmButtonColor: "#DD6B55",
                            confirmButtonText: "Delete",
                            cancelButtonText: "Cancel",
                            closeOnConfirm: false
                        }, function () {
                            $.ajax({
                                url: Glo_BaseUrl + "/message/del",
                                type: "post",
                                data: {
                                    "id": id,

                                },
                                success: function (data) {
                                    if (data.code === 200) {
                                        swal("Deletion Successful!", "You have deleted this message.", "success");
                                        getMessageList()
                                    } else {
                                        swal("Deletion Failed!", "Deletion failed.", "error");
                                    }

                                },
                                error: function () {
                                    alert("Server Error! Network Error!")
                                }
                            })
                        });
                    });
                    $(".seeRentDetail").click(function (){
                        localStorage.setItem("id",$(this).attr("thisId"))
                        localStorage.setItem("senderId",$(this).attr("senderId"))
                    })
                    // Send Message
                    $("#confirmSend").click(function (){


                        var formData = new FormData();//Instantiate FormData for file upload

                        formData.append("senderId",Glo_user);
                        formData.append("receiveId",localStorage.getItem("senderId"));

                        formData.append("content",$("#message").val());
                        formData.append("id",localStorage.getItem("id"));



                        // console.log(f)
                        $.ajax({
                            url: Glo_BaseUrl + "/message/add",
                            type: "post",
                            data:formData
                            ,
                            processData : false,
                            contentType : false,
                            success: function (data) {
                                console.log(data)
                                if (data.code === 200) {
                                    toastr.success("Success", 'Notification!')
                                    $("#close").click()
                                } else {
                                    toastr.error(data.msg, 'Notification!')
                                }
                                getMessageList();

                            },
                            error: function () {
                                alert("Server Error! Network Error!")
                            }
                        })
                    })



                    // Delete Message (Duplicate binding for safety)
                    $(".stopBtn").unbind("click").click(function () {
                        let id = $(this).attr("thisId")
                        swal({
                            title: "Are you sure to delete this message?",
                            text: "Deletion is irreversible!",
                            type: "warning",
                            showCancelButton: true,
                            confirmButtonColor: "#DD6B55",
                            confirmButtonText: "Delete",
                            cancelButtonText: "Cancel",
                            closeOnConfirm: false
                        }, function () {
                            $.ajax({
                                url: Glo_BaseUrl + "/message/del",
                                type: "post",
                                data: {
                                    "id": id,

                                },
                                success: function (data) {
                                    if (data.code === 200) {
                                        swal("Deletion Successful!", "You have deleted this message.", "success");
                                        getMessageList()
                                    } else {
                                        swal("Deletion Failed!", "Deletion failed.", "error");
                                    }

                                },
                                error: function () {
                                    alert("Server Error! Network Error!")
                                }
                            })
                        });
                    });
                },
                error: function () {
                    alert("Server Error! Network Error!")
                }
            })
        }

        // getMessageList()
        $("#confirmAddEq").click(function () {

            var formData = new FormData();//Instantiate FormData for file upload
            formData.append("senderId",Glo_user);
            formData.append("receiveId",1);
            formData.append("content",$("#content").val());
            formData.append("status","1");
            formData.append("type",role);
            $.ajax({
                url: Glo_BaseUrl + "/message/add",
                type: "post",
                data:formData
                ,
                processData : false,
                contentType : false,
                success: function (data) {

                    if (data.code === 200) {
                        toastr.success("Success", 'Notification!')
                        $("#close").click()
                    } else {
                        toastr.error(data.msg, 'Notification!')
                    }
                    getMessageList();

                },
                error: function () {
                    alert("Server Error! Network Error!")
                }
            })
        })
        getRoleSetMenu()
        // Logout
        $("#logout").click(function (){
            $.ajax({
                url: Glo_BaseUrl + "/admin/logout",
                type: "get",
                data: {

                },
                success: function (data) {

                    localStorage.removeItem("userId")
            window.location.href = Glo_BaseUrl + "/login"


                },
                error: function () {
                    alert("Server Error! Network Error!")
                }
            })
        })
    })

</script>

</body>

</html>
