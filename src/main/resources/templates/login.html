<!DOCTYPE html>
<html lang="en">

<!-- Head -->

<head>

    <title>Pet Service Booking Platform</title>

    <!-- Meta-Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="/static/hAdmin/css/bootstrap.min.css?v=3.3.6" rel="stylesheet">
    <link href="/static/hAdmin/css/font-awesome.css?v=4.4.0" rel="stylesheet">
    <link href="/static/hAdmin/css/plugins/toastr/toastr.min.css" rel="stylesheet">
    <link href="/static/hAdmin/css/animate.css" rel="stylesheet">
    <!-- style CSS -->
    <link rel="stylesheet" href="/static/login/css/style.css" type="text/css" media="all">
    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<!-- //Head -->

<!-- Body -->

<body>
<span id="gloUrl" style="display: none"></span>

    <section class="main">
        <div class="logo text-center">
            <h1> <a href="/web/userindex"> Pet Service Booking Platform</a></h1>
        </div>
        <div class="content-w3ls text-center">
            <img src="/static/login/images/admin.png" alt="Admin Icon" class="img-responsive">

                <div class="wthree-field">
                    <input name="text1" id="account" type="text" value="" placeholder="Username" required>
                </div>
                <div class="wthree-field">
                    <input name="password" id="password" type="Password" placeholder="Password">
                </div>
                <div class="wthree-field">
                    <button type="button" id="login" class="btn">Login</button>
                </div>
                <div class="login-bottom">
                    <a href="/web/register" id="register" class="">Create New Account</a>
                </div>

        </div>
        <div class="copyright">
            <p>xxx | <a href="javascript:void(0)" title="Pet Service Booking Platform">Pet Service Booking Platform</a></p>
        </div>
    </section>

</body>
<script src="/static/hAdmin/js/jquery.min.js?v=2.1.4"></script>

<script src="/static/hAdmin/js/bootstrap.min.js?v=3.3.6"></script>



<script src="/static/js/GloJs.js"></script>
<!-- //Body -->
<script src="/static/hAdmin/js/plugins/toastr/toastr.min.js"></script>
<script>
    //$(function(){ } is actually an anonymous function. This is JQuery syntax, $ represents JQuery object

    $(function (){
        let Glo_BaseUrl = $("#gloUrl").attr("gloUValue")

        //Login
        $("#login").click(function (){//Click event
            // console.log(Glo_BaseUrl)//Output general information
            if ($("#account").val() !== ""){
                $.ajax({
                    //Glo_BaseUrl is the common part
                    url: Glo_BaseUrl + "/toLogin",
                    //Update and add to database
                    type: "post",
                    data: {
                        //Parameters passed to the backend
                        "account":$("#account").val(),
                        "password":$("#password").val(),
                    },
                    success: function (data) {//Data returned from backend
                        if (data.code === 200){
                            //setItem("key","value"): Stores a value named key, updates value if key exists
                            //getItem("key"): Gets the value named key, returns null if key does not exist**
                            localStorage.setItem("userId",data.data.userId)
                            localStorage.setItem("role",data.data.role)
                            toastr.success(data.message, 'Login successful! Redirecting to homepage......')
                            if (data.data.role === "1"){
                                setTimeout(function (){
                                    window.location.href = Glo_BaseUrl + "/web/index"
                                },1000)
                            }else if (data.data.role === "2"){
                                setTimeout(function (){
                                    window.location.href = Glo_BaseUrl + "/web/userindex"
                                },1000)
                            }else if (data.data.role === "3"){
                                setTimeout(function (){
                                    window.location.href = Glo_BaseUrl + "/web/index"
                                },1000)
                            }
                        }else {
                            toastr.error(data.message, 'Login failed!')
                        }
                    },
                    error: function () {
                        alert("Server error! Network error!")
                    }
                })
            }else {
                toastr.error("Username is empty", 'Login failed!')
                //Message prompt (toastr.options configures the prompt box, achieving different effects through custom configurations)
            }
        })
        //Go to registration page
        $("#register").click(function (){
            window.location.href = Glo_BaseUrl + "/web/register"
        })
    })



</script>
</body>
</html>
