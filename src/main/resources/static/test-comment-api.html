<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论API测试</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .result { margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>评论回复功能API测试</h1>

    <div class="test-section">
        <h3>测试连接性</h3>
        <button onclick="testConnection()">测试后端连接</button>
        <div id="connection-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>获取公告1的评论树</h3>
        <button onclick="getCommentTree()">获取评论树</button>
        <div id="tree-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>测试发表回复</h3>
        <input type="text" id="replyContent" placeholder="输入回复内容" style="width: 300px; margin-right: 10px;">
        <button onclick="testReply()">发表回复</button>
        <div id="reply-result" class="result"></div>
    </div>

    <script>
        const BASE_URL = "http://localhost:7002";

        function testConnection() {
            $.ajax({
                url: BASE_URL + "/comment/notice/1",
                type: "GET",
                success: function(data) {
                    $("#connection-result").html('<div class="success">连接成功！' + JSON.stringify(data, null, 2) + '</div>');
                },
                error: function(xhr, status, error) {
                    $("#connection-result").html('<div class="error">连接失败：' + xhr.status + ' - ' + error + '</div>');
                }
            });
        }

        function getCommentTree() {
            $.ajax({
                url: BASE_URL + "/comment/tree/1",
                type: "GET",
                success: function(data) {
                    $("#tree-result").html('<div class="success">获取成功！' + JSON.stringify(data, null, 2) + '</div>');
                },
                error: function(xhr, status, error) {
                    $("#tree-result").html('<div class="error">获取失败：' + xhr.status + ' - ' + error + '</div>');
                }
            });
        }

        function testReply() {
            const content = $("#replyContent").val().trim();
            if (!content) {
                alert("请输入回复内容");
                return;
            }

            $.ajax({
                url: BASE_URL + "/comment/reply",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    noticeId: 1,
                    userId: 1,
                    parentId: 1,
                    content: content
                }),
                success: function(data) {
                    $("#reply-result").html('<div class="success">回复成功！' + JSON.stringify(data, null, 2) + '</div>');
                    $("#replyContent").val("");
                },
                error: function(xhr, status, error) {
                    $("#reply-result").html('<div class="error">回复失败：' + xhr.status + ' - ' + error + '<br>Response: ' + xhr.responseText + '</div>');
                }
            });
        }
    </script>
</body>
</html>
