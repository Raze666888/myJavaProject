spring:
  datasource:
    url: jdbc:h2:mem:testdb_${random.int};MODE=MySQL;NON_KEYWORDS=ORDER
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  sql:
    init:
      mode: always

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 2000ms

  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.javaPro.myProject.modules.*.entity

logging:
  level:
    com.javaPro.myProject: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
