# Test Environment Configuration

# Server
server.port=8080
server.servlet.context-path=/

# Database - H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.javaPro.myProject.modules.*.entity

# Redis - Test Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=2000

# Logging
logging.level.com.javaPro.myProject=DEBUG
logging.level.org.springframework.web=INFO

# OSS Configuration for Testing
oss.endpoint=http://oss.aliyuncs.com
oss.bucketName=test-bucket
oss.accessKeyId=test-key
oss.accessKeySecret=test-secret
oss.urlPrefix=http://localhost:7002/uploads/
