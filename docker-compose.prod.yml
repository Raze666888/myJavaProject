version: '3.8'

services:
  # 生产环境应用服务
  app:
    image: ghcr.io/raze666888/myjavaproject:latest
    container_name: myJavaProject-prod
    ports:
      - "${SERVER_PORT:-7002}:7002"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:mysql://mysql:3306/myJavaProject_prod?serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
      - DATABASE_USERNAME=${DB_USERNAME}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME}
      - OSS_URL_PREFIX=${OSS_URL_PREFIX}
      - LOG_FILE=${LOG_FILE:-/app/logs/application.log}
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - prod-network
    volumes:
      - prod-logs:/app/logs
      - prod-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7002/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 生产环境MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: myJavaProject-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: myJavaProject_prod
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - prod-mysql-data:/var/lib/mysql
    networks:
      - prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password

  # 生产环境Redis缓存
  redis:
    image: redis:7-alpine
    container_name: myJavaProject-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - prod-redis-data:/data
    networks:
      - prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: myJavaProject-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - prod-static:/var/www/static
    depends_on:
      - app
    networks:
      - prod-network
    restart: unless-stopped

volumes:
  prod-mysql-data:
    driver: local
  prod-redis-data:
    driver: local
  prod-logs:
    driver: local
  prod-uploads:
    driver: local
  prod-static:
    driver: local

networks:
  prod-network:
    driver: bridge
