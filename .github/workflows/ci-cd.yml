name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Microsoft Edge
      run: |
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
        sudo install -o root -g root -m 644 microsoft.gpg /etc/apt/trusted.gpg.d/
        echo "deb [arch=amd64] https://packages.microsoft.com/repos/edge stable main" | sudo tee /etc/apt/sources.list.d/microsoft-edge.list
        sudo apt update
        sudo apt install -y microsoft-edge-stable

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

    - name: 赋予 Edge 驱动执行权限
      run: chmod +x drivers/msedgedriver

    - name: Run tests
      working-directory: ./
      run: mvn clean test
      env:
        OSS_ENDPOINT: ${{ secrets.TEST_OSS_ENDPOINT }}
        OSS_ACCESS_KEY_ID: ${{ secrets.TEST_ACCESS_KEY }}
        OSS_ACCESS_KEY_SECRET: ${{ secrets.TEST_ACCESS_SECRET }}
        DISPLAY: ""

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: target/surefire-reports/*.xml
        reporter: java-junit