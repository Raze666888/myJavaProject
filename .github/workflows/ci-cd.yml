name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read
  packages: write
  id-token: write

jobs:
  # 单元测试任务
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Run unit tests
      run: mvn clean test -DskipITs
      env:
        MAVEN_OPTS: "-Xmx1024m"

    - name: Generate unit test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Unit Tests Report
        path: target/surefire-reports/*.xml
        reporter: java-junit

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella

  # 集成测试任务
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testdb
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Run integration tests
      run: mvn verify -DincludeITs
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/testdb
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379
        MAVEN_OPTS: "-Xmx1024m"

    - name: Generate integration test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      continue-on-error: true
      with:
        name: Integration Tests Report
        path: |
          target/surefire-reports/TEST-*.xml
          target/failsafe-reports/TEST-*.xml
        reporter: java-junit

  # API测试任务
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testdb
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build and start application
      run: |
        mvn clean package -DskipTests
        java -jar target/*.jar &
        sleep 30
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/testdb
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379

    - name: Run API tests
      run: mvn test -Dtest=*IntegrationTest
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/testdb
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379

    - name: Generate API test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      continue-on-error: true
      with:
        name: API Tests Report
        path: |
          target/surefire-reports/TEST-*.xml
          target/failsafe-reports/TEST-*.xml
        reporter: java-junit

  # 代码质量检查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build and analyze with SonarQube
      run: |
        mvn clean verify sonar:sonar \
          -Dsonar.projectKey=myJavaProject \
          -Dsonar.sources=src/main \
          -Dsonar.tests=src/test \
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
      continue-on-error: true
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}

  # 构建产物任务（标准CI产物输出）
  build-artifact:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build JAR package
      run: mvn -B clean package -DskipTests
      env:
        MAVEN_OPTS: "-Xmx1024m"

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar
        if-no-files-found: error
        retention-days: 14

  # 最终报告汇总
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests, build-artifact]
    if: always()
    steps:
    - name: Print Summary
      run: |
        echo "========================================="
        echo "测试执行完成"
        echo "========================================="
        echo "单元测试: ${{ needs.unit-tests.result }}"
        echo "集成测试: ${{ needs.integration-tests.result }}"
        echo "API测试: ${{ needs.api-tests.result }}"
        echo "构建产物: ${{ needs.build-artifact.result }}"
        echo "========================================="
      
    - name: Notify on failure
      if: failure()
      run: echo "⚠️  某些测试失败，请检查上面的报告"

  # Docker镜像构建和推送
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests, build-artifact]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build JAR package
      run: mvn -B clean package -DskipTests
      env:
        MAVEN_OPTS: "-Xmx1024m"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/Raze666888/myJavaproject
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ghcr.io/Raze666888/myJavaproject
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true

  # 部署到生产环境
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy notification
      run: |
        echo "🚀 开始部署到生产环境..."
        echo "镜像: ghcr.io/Raze666888/myJavaproject:latest"
        echo "提交: ${{ github.sha }}"
        echo "分支: ${{ github.ref_name }}"
        echo "触发者: ${{ github.actor }}"

    # 这里可以添加具体的部署步骤，比如：
    # - 更新 Kubernetes deployment
    # - 重启容器服务
    # - 执行数据库迁移
    # - 发送部署通知

    - name: Deployment completed
      run: |
        echo "✅ 部署完成！"
        echo "应用已在生产环境更新"
