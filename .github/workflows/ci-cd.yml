name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE_NAME: ghcr.io/raze666888/myjavaproject

jobs:
  # 单元测试任务
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Run unit tests
      run: mvn clean test -DskipITs
      env:
        MAVEN_OPTS: "-Xmx1024m"

    - name: Generate unit test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Unit Tests Report
        path: target/surefire-reports/*.xml
        reporter: java-junit

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella

  # 集成测试任务
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testdb
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Run integration tests
      run: mvn verify -DincludeITs
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/testdb
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379
        MAVEN_OPTS: "-Xmx1024m"

    - name: Generate integration test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      continue-on-error: true
      with:
        name: Integration Tests Report
        path: |
          target/surefire-reports/TEST-*.xml
          target/failsafe-reports/TEST-*.xml
        reporter: java-junit

  # API测试任务
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testdb
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build and start application
      run: |
        mvn clean package -DskipTests
        java -jar target/*.jar &
        sleep 30
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/testdb
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379

    - name: Run API tests
      run: mvn test -Dtest=*IntegrationTest
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/testdb
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379

    - name: Generate API test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      continue-on-error: true
      with:
        name: API Tests Report
        path: |
          target/surefire-reports/TEST-*.xml
          target/failsafe-reports/TEST-*.xml
        reporter: java-junit

  # 代码质量检查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build and analyze with SonarQube
      run: |
        mvn clean verify sonar:sonar \
          -Dsonar.projectKey=myJavaProject \
          -Dsonar.sources=src/main \
          -Dsonar.tests=src/test \
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
      continue-on-error: true
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}

  # 构建产物任务（标准CI产物输出）
  build-artifact:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build JAR package
      run: mvn -B clean package -DskipTests
      env:
        MAVEN_OPTS: "-Xmx1024m"

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar
        if-no-files-found: error
        retention-days: 14

  # 最终报告汇总
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests, build-artifact]
    if: always()
    steps:
    - name: Print Summary
      run: |
        echo "========================================="
        echo "测试执行完成"
        echo "========================================="
        echo "单元测试: ${{ needs.unit-tests.result }}"
        echo "集成测试: ${{ needs.integration-tests.result }}"
        echo "API测试: ${{ needs.api-tests.result }}"
        echo "构建产物: ${{ needs.build-artifact.result }}"
        echo "========================================="
      
    - name: Notify on failure
      if: failure()
      run: echo "⚠️  某些测试失败，请检查上面的报告"

  # Docker镜像构建和推送
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests, build-artifact]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: target

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: push
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true

  # 生产部署交接（手动在本地虚拟机执行）
  deploy-production:
    name: Prepare Manual Deployment
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Upload deployment bundle
      uses: actions/upload-artifact@v4
      with:
        name: manual-deployment-bundle
        path: |
          docker-compose.prod.yml
          scripts/deploy-production.sh
          .env.prod.example
          config/nginx.conf
        if-no-files-found: error
        retention-days: 14

    - name: Print manual deployment instructions
      run: |
        echo "手动部署包已生成: manual-deployment-bundle"
        echo "镜像地址: ${{ env.IMAGE_NAME }}:latest"
        echo "提交SHA: ${{ github.sha }}"
        echo ""
        echo "请在 Ubuntu 虚拟机中执行以下步骤："
        echo "1. 从 Actions 下载 manual-deployment-bundle 并解压到 /opt/myjavaproject"
        echo "2. 复制 .env.prod.example 为 .env.prod，并填写数据库/Redis 参数"
        echo "3. 登录 GHCR:"
        echo "   echo '<GHCR_TOKEN>' | docker login ghcr.io -u '<GHCR_USERNAME>' --password-stdin"
        echo "4. 进入部署目录后执行:"
        echo "   chmod +x scripts/deploy-production.sh"
        echo "   ./scripts/deploy-production.sh latest"
        echo "5. 验证服务:"
        echo "   docker compose --env-file .env.prod -f docker-compose.prod.yml ps"
        echo "   curl http://localhost:7002/actuator/health"
